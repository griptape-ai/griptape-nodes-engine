  - llmstxt:
      full_output: llms-full.txt
      markdown_description: |
        Documentation for the Griptape Nodes engine: scripting (retained mode),
        the project system, custom node development, the built-in node
        reference, and the engine MCP surface. Use these files to ground an
        agent in the engine's actual API rather than scraping rendered HTML or
        fetching unrenderered raw markdown from `main`.
      sections:
        Get started:
          - index.md: Top-level introduction to Griptape Nodes
          - installation.md: Install the engine
          - faq.md: Frequently asked questions
          - glossary.md: Terms and definitions used throughout the docs
          - for_agents.md: Hosted machine-readable docs surface (this page)
        Tutorials:
          - tutorials/index.md: Tutorial overview
          - tutorials/00_tour/index.md
          - tutorials/01_prompt_an_image/index.md
          - tutorials/02_coordinating_agents/index.md
          - tutorials/03_compare_prompts/index.md
          - tutorials/04_photography_team/index.md
        Agent:
          - guides/agent/index.md: Built-in AI assistant with direct workflow access via the Griptape MCP server
          - guides/agent/using_in_workflows.md: Using the Agent node in workflows
          - guides/agent/choosing_a_model.md: Selecting an AI model for the agent
          - guides/agent/sending_messages.md: Sending messages and attaching files
          - guides/agent/threads.md: Conversation threads and local storage locations
          - guides/agent/personalization.md: Customizing agent tone, role, and system prompt
          - guides/agent/skills.md: Extending the agent with custom skill files
          - guides/agent/mcp_servers.md: Attaching MCP servers to an agent conversation
          - guides/agent/providers/index.md: Overview of supported AI providers
          - guides/agent/providers/griptape_cloud.md: Griptape Cloud (default hosted provider)
          - guides/agent/providers/ollama.md: Ollama local provider setup
          - guides/agent/providers/lm_studio.md: LM Studio local provider setup
          - guides/agent/providers/custom.md: Custom OpenAI-compatible endpoint setup
        Configuration and libraries:
          - guides/configuration.md: Engine configuration (workspace, secrets, libraries)
          - guides/libraries.md: Installing and managing node libraries
        Project system:
          - guides/projects/index.md: Project system overview
          - guides/projects/gui_guide.md: Managing projects from the GUI
          - guides/projects/workspace.md: Workspace concepts
          - guides/projects/projects.md: Projects
          - guides/projects/directories.md: Directories
          - guides/projects/macros.md: Macros
          - guides/projects/situations.md: Situations
          - guides/projects/environment.md: Environment and built-in variables
          - guides/projects/file_extension_directories.md: File extension directories
          - guides/projects/sequences.md: Numbered file sequences (patterns and policies)
          - guides/projects/version_pinning.md: Pinning engine and library versions
          - guides/projects/customization.md: Customization guide
        Publishing:
          - guides/publishing.md: Publishing a workflow — lifecycle, dependency bundling, and static-file workarounds
        MCP integration:
          - guides/mcp/index.md: MCP integration overview
          - guides/mcp/getting_started.md
          - guides/mcp/connection_types/stdio.md
          - guides/mcp/connection_types/sse.md
          - guides/mcp/connection_types/streamable_http.md
          - guides/mcp/connection_types/websocket.md
          - guides/mcp/mcp_task_agents.md
          - guides/mcp/advanced_local_models.md
          - guides/mcp/external_clients.md
          - guides/mcp/rules.md
          - guides/mcp/servers/index.md
          - guides/mcp/servers/blender.md
          - guides/mcp/servers/exa.md
          - guides/mcp/servers/fetch.md
          - guides/mcp/servers/filesystem.md
          - guides/mcp/servers/maya.md
          - guides/mcp/servers/time.md
        External services:
          - guides/integrations/openai.md
          - guides/integrations/grok.md
          - guides/integrations/hugging_face.md
        Scripting (retained mode):
          - development/retained_mode.md: Engine scripting API for building and running workflows
        Custom nodes:
          - development/custom_nodes/index.md: Developing custom nodes overview
          - development/custom_nodes/getting_started.md: Beginner-friendly intro to node development
          - development/custom_nodes/comprehensive_guide.md: Exhaustive node development reference
          - development/custom_nodes/node_isolation_with_workers.md: Running a library isolated in a worker subprocess for dependency isolation
          - development/custom_nodes/strict_mode.md: Strict-mode rules that identify isolation incompatibilities
        Reference:
          - reference/command_line_interface.md: gtn CLI reference
          - reference/configuration_reference.md: Every engine setting with type, default, and env var
        Enterprise:
          - enterprise/admin_server.md: Run a single in-network proxy so app instances avoid public internet access
        Agent skills:
          - skills/griptape-nodes-workflows/SKILL.md: Build, run, and inspect workflows through the engine's MCP server
        Node reference:
          - nodes/*.md

extra_css:
  - assets/css/extra.css

copyright: "&copy; Griptape, Inc."
extra:
  analytics:
    provider: google
    property: G-25RZCVNV2D
  social:
    - icon: fontawesome/solid/house
      link: https://www.griptape.ai
    - icon: fontawesome/brands/discord
      link: https://discord.gg/gnWRz88eym
    - icon: fontawesome/brands/github
      link: https://github.com/griptape-ai/griptape-nodes-engine

theme:
  name: material
  logo: assets/img/griptape_nodes_header_logo.svg
  palette:
    # Dark mode
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode
    # Light mode
    - scheme: default
      primary: deep indigo
      accent: deep orange
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.expand
    - navigation.top
    - navigation.tabs.sticky
    - navigation.sections

markdown_extensions:
  - pymdownx.highlight
  - admonition
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - tables
  - md_in_html
  - toc:
      toc_depth: 3

