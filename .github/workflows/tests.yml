name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-test-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout actions
        uses: actions/checkout@v7
      - name: Init environment
        uses: ./.github/actions/init-environment
      - name: Run unit tests with coverage
        run: make test/unit/coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          token: ${{ secrets.CODECOV_TOKEN }}
  unit-test-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout actions
        uses: actions/checkout@v7
      - name: Init environment
        uses: ./.github/actions/init-environment
      - name: Run unit tests
        # TODO: make test/unit fails with the following error:
        # process_begin: CreateProcess(NULL, uv run pytest -n auto tests/unit, ...) failed.
        # make (e=2): The system cannot find the file specified.
        # make: *** [Makefile:24: test/unit] Error 2
        run: uv run pytest -n auto tests/unit
  e2e-test-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout actions
        uses: actions/checkout@v7
      - name: Init environment
        uses: ./.github/actions/init-environment
      - name: Run e2e tests
        run: make test/e2e
  e2e-test-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout actions
        uses: actions/checkout@v7
      - name: Init environment
        uses: ./.github/actions/init-environment
      - name: Run e2e tests
        # Mirrors unit-test-windows: invoke pytest directly because make on Windows
        # cannot resolve the uv command line through CreateProcess.
        run: uv run pytest tests/e2e
